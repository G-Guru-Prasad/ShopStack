{% extends "stackapp/base.html" %}
{% load static %}

{% block title %}Dashboard — ShopStack{% endblock %}

{% block content %}
<div style="margin-bottom: 16px;">
  <h5 class="teal-text text-darken-2">
    Welcome, <span id="username-display"></span>
  </h5>
</div>

<div class="row">

  <!-- Orders card -->
  <div class="col s12 m8">
    <div class="card z-depth-1">
      <div class="card-content">
        <span class="card-title">
          <i class="material-icons left teal-text text-darken-2">receipt</i>Recent Orders
        </span>

        <!-- Preloader -->
        <div id="orders-preloader" class="center-align" style="padding: 24px 0;">
          <div class="preloader-wrapper small active">
            <div class="spinner-layer spinner-teal-only">
              <div class="circle-clipper left"><div class="circle"></div></div>
              <div class="gap-patch"><div class="circle"></div></div>
              <div class="circle-clipper right"><div class="circle"></div></div>
            </div>
          </div>
        </div>

        <!-- Orders table (hidden until loaded) -->
        <div id="orders-table-wrap" style="display:none; overflow-x:auto;">
          <table class="striped responsive-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Status</th>
                <th>Total</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <!-- Cart card -->
  <div class="col s12 m4">
    <div class="card z-depth-1">
      <div class="card-content">
        <span class="card-title">
          <i class="material-icons left teal-text text-darken-2">shopping_cart</i>Active Cart
        </span>

        <!-- Preloader -->
        <div id="cart-preloader" class="center-align" style="padding: 24px 0;">
          <div class="preloader-wrapper small active">
            <div class="spinner-layer spinner-teal-only">
              <div class="circle-clipper left"><div class="circle"></div></div>
              <div class="gap-patch"><div class="circle"></div></div>
              <div class="circle-clipper right"><div class="circle"></div></div>
            </div>
          </div>
        </div>

        <div id="cart-content" style="display:none;">
          <p id="cart-summary"></p>
          <a href="/profile/" class="btn-flat teal-text text-darken-2 waves-effect">
            View Profile <i class="material-icons right">arrow_forward</i>
          </a>
        </div>

      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'stackapp/js/dashboard.js' %}"></script>
{% endblock %}
