{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — ShopStack</title>

  <!-- Materialize CSS -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
        integrity="sha512-UJfAaOlIRtdR+0P6C3KUoTDAxVTuy3lnSXLyLKlHYJlcSU8Juge/mjeaxDNMlw9LgeIotgz5FP8eUQPhX1q10A=="
        crossorigin="anonymous">

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-wrap {
      width: 100%;
      max-width: 420px;
      border-radius: 4px;
    }
    .card-wrap .card-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #00695c;
      margin-bottom: 8px;
    }
    .card-wrap .brand-sub {
      color: #78909c;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .btn-full { width: 100%; margin-top: 8px; }
    #success-panel { display: none; }
    #back-to-login {
      color: #00695c;
      font-size: 0.9rem;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="card-wrap card z-depth-3">
    <div class="card-content">

      <div id="form-panel">
        <p class="card-title">Set New Password</p>
        <p class="brand-sub">Choose a strong password for your account.</p>

        <!-- New password -->
        <div class="input-field">
          <input id="new-password" type="password" autocomplete="new-password">
          <label for="new-password">New Password</label>
          <i class="material-icons suffix" id="pwd-toggle"
             style="cursor:pointer;" aria-label="Show/hide password">visibility</i>
        </div>

        <!-- Confirm password -->
        <div class="input-field">
          <input id="confirm-password" type="password" autocomplete="new-password">
          <label for="confirm-password">Confirm New Password</label>
        </div>

        <p id="error-msg" class="red-text" style="display:none;" aria-live="polite"></p>

        <button id="submit-btn" type="button"
                class="btn teal darken-2 waves-effect waves-light btn-full">
          Set Password
        </button>
      </div>

      <div id="success-panel">
        <p class="card-title">
          <i class="material-icons" style="vertical-align:middle; font-size:1.8rem;">check_circle</i>
          Password Updated!
        </p>
        <p class="brand-sub">Your password has been reset successfully.</p>
        <a href="/login/" class="btn teal darken-2 waves-effect waves-light btn-full">
          Back to Sign In
        </a>
      </div>

    </div>
  </div>

  <!-- Materialize JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"
          integrity="sha512-NiWqa2rceHnN3Z5j6mSAvbwwg3tiwVNxiAQaaSMSXnRRDh5C2mk/+sKQRw8qjV1vN4nf8iK2a0b048PnHbyx+Q=="
          crossorigin="anonymous"></script>

  <!-- Page logic -->
  <script src="{% static 'stackapp/js/reset_password.js' %}"></script>

</body>
</html>
