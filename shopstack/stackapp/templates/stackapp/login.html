{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ShopStack</title>

  <!-- Materialize CSS -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
        integrity="sha512-UJfAaOlIRtdR+0P6C3KUoTDAxVTuy3lnSXLyLKlHYJlcSU8Juge/mjeaxDNMlw9LgeIotgz5FP8eUQPhX1q10A=="
        crossorigin="anonymous">

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border-radius: 4px;
    }
    .login-card .card-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #00695c;
      margin-bottom: 8px;
    }
    .login-card .brand-sub {
      color: #78909c;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .btn-login { width: 100%; margin-top: 8px; }
    #error-msg { min-height: 20px; }
  </style>
</head>
<body>

  <div class="login-card card z-depth-3">
    <div class="card-content">
      <p class="card-title">ShopStack</p>
      <p class="brand-sub">Sign in to your account</p>

      <form id="login-form" novalidate>

        <!-- Username -->
        <div class="input-field">
          <input id="username" type="text" autocomplete="username" required>
          <label for="username">Username</label>
        </div>

        <!-- Password -->
        <div class="input-field">
          <input id="password" type="password" autocomplete="current-password" required>
          <label for="password">Password</label>
          <i class="material-icons suffix" id="pwd-toggle"
             style="cursor:pointer;" aria-label="Show/hide password">visibility</i>
        </div>

        <!-- Error message -->
        <p id="error-msg" class="red-text" aria-live="polite" style="display:none;"></p>

        <!-- Submit -->
        <button id="submit-btn" type="submit"
                class="btn teal darken-2 waves-effect waves-light btn-login">
          Sign In
        </button>

      </form>
    </div>
  </div>

  <!-- Materialize JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"
          integrity="sha512-NiWqa2rceHnN3Z5j6mSAvbwwg3tiwVNxiAQaaSMSXnRRDh5C2mk/+sKQRw8qjV1vN4nf8iK2a0b048PnHbyx+Q=="
          crossorigin="anonymous"></script>

  <!-- Shared auth utilities -->
  <script src="{% static 'stackapp/js/auth.js' %}"></script>

  <!-- Page-specific logic -->
  <script src="{% static 'stackapp/js/login.js' %}"></script>

</body>
</html>
